set -s escape-time 0
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set-option -g default-shell "/bin/zsh"
set-option -g default-command "/bin/zsh"
set-option -g renumber-windows on

# window operation
bind-key -n C-n next-window
bind-key -n C-p previous-window
bind-key -n C-f new-window

# mouse setting
set-window-option -g mouse on
bind-key -n MouseDown3Pane paste-buffer

# statusbar setting
set-option -g status-style bg="colour208",fg="colour255"
set-option -g status-left "#[bg=colour208,fg=colour0,bold] #S #[fg=colour208,bg=default]"
set-option -g status-right "#[fg=colour208,bg=default]#[bg=colour208,fg=colour255] %H:%M"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=colour223,fg=colour0,bold"
setw -g window-status-current-format "#[fg=colour223,bg=colour208]#[bg=colour223,fg=colour0,bold] #I:#W #[fg=colour223,bg=colour208]"

